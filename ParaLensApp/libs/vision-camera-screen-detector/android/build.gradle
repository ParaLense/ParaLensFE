buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['VisionCameraScreenDetector_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

// Nitrogen-generated autolinking (Kotlin source dirs, C++ codegen wiring).
apply from: '../nitrogen/generated/android/VisionCameraScreenDetector+autolinking.gradle'

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["VisionCameraScreenDetector_" + name]).toInteger()
}

android {
  namespace "com.alex8734.visioncamerascreendetector"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")

    externalNativeBuild {
      cmake {
        cppFlags "-O2 -frtti -fexceptions -Wall -fstack-protector-all"
        // Nitro / React Native native libs (e.g. hermestooling) require the
        // shared C++ STL; the NDK default here would otherwise be static.
        arguments "-DANDROID_STL=c++_shared"
      }
    }

    ndk {
      abiFilters "arm64-v8a", "armeabi-v7a", "x86", "x86_64"
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  // Nitro core + VisionCamera v5 (provides HybridFrameSpec / HybridFrame).
  implementation project(":react-native-nitro-modules")
  implementation project(":react-native-vision-camera")
  implementation "androidx.camera:camera-core:1.3.4"
  implementation 'org.opencv:opencv:4.12.0'
  implementation 'com.google.mlkit:text-recognition:16.0.1'
}
